# ============================================================
#  Drivable Area Detection — Configuration
#  Phase 3: augmentation parameters added
# ============================================================

project:
  name: "Drivable Area Detection"
  version: "2.0.0"

paths:
  dataset_dir:      "dataset"
  images_pickle:    "dataset/images_3000_160.p"
  labels_pickle:    "dataset/labels_3000_160.p"
  model_checkpoint: "checkpoints/lane_segment.pth"
  log_dir:          "logs"
  output_dir:       "outputs"

data:
  image_height: 80
  image_width:  160
  num_classes:  3             # green=bg, red=drivable, blue=adjacent
  train_split:  0.7
  val_split:    0.3
  augment:      true          # set false to disable Albumentations pipeline

  # ── Albumentations parameters (used in src/data/dataset.py) ──────────────
  aug:
    horizontal_flip_p:      0.5
    brightness_limit:       0.2
    contrast_limit:         0.2
    brightness_contrast_p:  0.5
    hue_shift_limit:        10
    sat_shift_limit:        20
    val_shift_limit:        10
    hue_sat_p:              0.3
    clahe_clip_limit:       2.0
    clahe_p:                0.3
    shift_limit:            0.03
    scale_limit:            0.05
    rotate_limit:           10
    shift_scale_rotate_p:   0.4
    coarse_dropout_holes:   4
    coarse_dropout_p:       0.2

model:
  in_channels:  3
  out_channels: 3
  features:     [64, 128, 256, 512]

training:
  epochs: 60          # was 20 — needs more time, especially for Adjacent
  batch_size: 16
  learning_rate: 0.001
  optimizer: "adam"
  loss: "cross_entropy"
  save_best: true
  log_interval: 1            # log every N epochs

inference:
  device: "auto"               # "auto", "cpu", or "cuda"
  confidence_threshold: 0.5
